# ============================================
# Docker Compose — Local Development
# ============================================

version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fakenews-backend
    ports:
      - "8000:8000"
    environment:
      - MOCK_MODE=False
      - DEBUG=True
      - USE_GPU=False
      - TESSERACT_CMD=/usr/bin/tesseract
      # Add your API keys here:
      # - NEWSAPI_KEY=your_key
      # - GOOGLE_API_KEY=your_key
      # - GOOGLE_CX_ID=your_id
      # - OPENAI_API_KEY=your_key
    volumes:
      - ./app:/app/app  # Hot-reload during development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/api/v1/health'); assert r.status_code == 200"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
