name: fake_news_detector
description: "Multimodal Fake News Detection App — AI-powered news verification"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP & Networking
  dio: ^5.7.0

  # Image Picker (Camera + Gallery)
  image_picker: ^1.1.2

  # State Management
  provider: ^6.1.2

  # Google Fonts
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.2

  # Percentage indicator (gauge)
  percent_indicator: ^4.2.3

  # URL launcher (open articles)
  url_launcher: ^6.3.1

  # Shimmer loading effect
  shimmer: ^3.0.0

  # Local storage
  shared_preferences: ^2.3.4

  # Share results
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
